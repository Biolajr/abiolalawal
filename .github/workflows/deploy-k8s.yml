# =============================================
# DEPLOY TO KUBERNETES CLUSTER
# Run this when your RKE2 homelab is ready
# Triggered manually or by pushing a k8s tag
# =============================================

name: Deploy to Kubernetes

on:
  push:
    tags:
      - 'k8s-*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

jobs:
  deploy-k8s:
    name: Deploy → RKE2 Cluster
    runs-on: ubuntu-latest
    environment:
      name: kubernetes
      url: https://abiolalawal.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image in manifest
        run: |
          TAG=${{ github.event.inputs.image_tag || 'latest' }}
          sed -i "s|ghcr.io/biolajr/abiolalawal:latest|ghcr.io/biolajr/abiolalawal:${TAG}|g" k8s/portfolio.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/portfolio.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/portfolio -n portfolio --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n portfolio
          kubectl get ingress -n portfolio
